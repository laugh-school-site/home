name: Update Viber Subscriber Count

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit & push the updated index.html

jobs:
  update-subscribers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch subscriber count & patch index.html
        env:
          VIBER_TOKEN: ${{ secrets.VIBER_TOKEN }}
        run: python fetch_subscribers.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          git diff --cached --quiet || git commit -m "chore: update Viber subscriber count [skip ci]"
          git push
